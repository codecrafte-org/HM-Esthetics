<style>
    :root {
        --skin: #e2c0a8;
        --dark: #0a0a0a;
    }

    /* --- Global Reset --- */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .product-hero {
        position: relative;
        width: 100%;
        min-height: 100vh; /* Laptop par height */
        background-color: var(--dark);
        display: flex;
        align-items: center;
        justify-content: flex-start; /* Text left side par rakhega */
        padding: 60px 8%; /* Sides se safe margin */
        overflow: hidden;
    }

    /* Background Image setup taake text overlap na kare */
    .product-hero::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 100%; /* Shuru mein poori width */
        height: 100%;
        background-image: url('https://images.unsplash.com/photo-1556228578-0d85b1a4d571?q=80&w=2048');
        background-size: cover;
        background-position: center;
        z-index: 1;
    }

    /* Dark Gradient Overlay taake text parha jaye */
    .product-hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to right, rgba(10,10,10,1) 30%, rgba(10,10,10,0.4) 100%);
        z-index: 2;
    }

    .product-hero-content {
        position: relative;
        z-index: 10; /* Image aur overlay ke upar rakhega */
        max-width: 550px; /* Text ko ek hadd mein rakhega */
    }

    .status-badge {
        display: inline-block;
        padding: 6px 15px;
        border: 1px solid var(--skin);
        color: var(--skin);
        border-radius: 50px;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 20px;
    }

    .product-hero-content span {
        color: var(--skin);
        text-transform: uppercase;
        letter-spacing: 3px;
        font-size: 0.9rem;
        display: block;
        margin-bottom: 10px;
    }

    .product-hero-content h1 {
        color: #fff;
        font-size: clamp(2.2rem, 5vw, 4rem);
        font-weight: 300;
        line-height: 1.2;
        margin-bottom: 20px;
    }

    .product-hero-content p {
        color: #b0b0b0;
        font-size: 1rem;
        line-height: 1.6;
        max-width: 450px;
    }

    /* --- Mobile Fixes --- */
    @media (max-width: 768px) {
        .product-hero {
            min-height: 100vh;
            padding: 40px 20px;
            justify-content: center; /* Mobile par center */
            text-align: center;
        }

        .product-hero::after {
            background: linear-gradient(to top, rgba(10,10,10,1) 50%, rgba(10,10,10,0.6) 100%);
        }

        .product-hero-content {
            max-width: 100%;
        }
        
        .product-hero-content p {
            margin: 0 auto;
        }
    }
</style>

<style>
        /* --- 1. VARIABLES & RESET --- */
        :root {
            --primary: #d4b499;
            --white: #ffffff;
            --dark: #0a0a0a;
            --font-heading: 'Syne', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow-x: hidden; font-family: var(--font-heading); }

        /* --- 2. NAVBAR --- */
        .navbar {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
    width: 90%; z-index: 1000; padding: 5px 20px;
    background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
    border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.5s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .navbar.sticky { 
            top: 0; width: 100%; border-radius: 0; 
            background: rgba(10, 10, 10, 0.95); 
            padding: 15px 5%;
        }

        .nav-container { 
            display: flex; justify-content: space-between; 
            align-items: center; width: 100%; 
        }

        .desktop-only { display: flex; gap: 30px; align-items: center; }

        .nav-link {
            text-decoration: none; color: var(--white);
            font-size: 0.7rem; font-weight: 300;
            text-transform: uppercase; letter-spacing: 3px;
            opacity: 0.6; position: relative;
            transition: all 0.4s ease;
        }

        .nav-link:hover { opacity: 1; color: var(--primary); letter-spacing: 4px; }

        .nav-logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .main-logo { height: 40px; width: auto;   }
        
        .brand-name { 
            color: var(--white); font-size: 1.2rem; 
            letter-spacing: 4px; text-transform: uppercase; 
        }

        .book-btn {
            background: var(--white); color: var(--dark); border: none;
            padding: 10px 22px; border-radius: 30px; font-size: 0.7rem;
            font-weight: 700; text-transform: uppercase; cursor: pointer;
            transition: 0.3s;
        }

        .book-btn:hover { background: var(--primary); color: #000; }

        /* --- 3. HAMBURGER & SIDEBAR --- */
        .menu-toggle {
            display: flex; flex-direction: column; gap: 6px; 
            cursor: pointer; z-index: 2001;
            display: none;
        }
        .menu-toggle span { width: 25px; height: 2px; background: white; transition: 0.3s; }

        .sidebar {
            position: fixed; top: 0; right: -100%; width: 320px; height: 100%;
            background: #111; z-index: 3000; padding: 100px 40px;
            transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1);
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar.active { right: 0; }

        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2500;
            display: none; opacity: 0; transition: 0.4s;
        }
        .sidebar-overlay.active { display: block; opacity: 1; }

        .sidebar-nav { display: flex; flex-direction: column; gap: 30px; }
        .sidebar-nav a { 
            color: white; text-decoration: none; 
            font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px;
        }

        .close-sidebar { 
            position: absolute; top: 30px; right: 30px; 
            font-size: 2.5rem; color: white; cursor: pointer; 
        }


        /* Mobile Fixes */
        @media (max-width: 768px) {
            .desktop-only { display: none; }
            .navbar { top: 15px; }
            .menu-toggle{
                display: flex;
            }
        }
    </style>
    <div class="sidebar-overlay" id="overlay"></div>
    <header class="navbar" id="main-nav">
        <div class="nav-container">

            </div>

                <img src="../images/logo.svg" alt="Logo" class="main-logo">
             </div>

            <div class="nav-right">
                <div class="desktop-only">
                    <a href="./service.html" class="nav-link" style="margin-right: 20px;">Services</a>
                    <a href="./product.html" style="text-decoration: none;"><button class="book-btn">Product</button></a>
                </div>
                <div class="menu-toggle" id="menu-btn">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </header>
    <aside class="sidebar" id="sidebar">
        <div class="close-sidebar" id="close-btn">&times;</div>
        <nav class="sidebar-nav">
            <a href="../index.html">Home</a>
            <a href="./Gallary.html">Gallery</a>
            <a href="./service.html">Services</a>
            <a href="./product.html">Products</a>
        </nav>
    </aside>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        const menuBtn = document.getElementById('menu-btn');
        const sidebar = document.getElementById('sidebar');
        const closeBtn = document.getElementById('close-btn');
        const overlay = document.getElementById('overlay');
        const nav = document.getElementById('main-nav');

        // Toggle Sidebar
        menuBtn.addEventListener('click', () => {
            sidebar.classList.add('active');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        });

        const hideSidebar = () => {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        closeBtn.addEventListener('click', hideSidebar);
        overlay.addEventListener('click', hideSidebar);

        // Sticky Navbar
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                nav.classList.add('sticky');
            } else {
                nav.classList.remove('sticky');
            }
        });

        // GSAP Reveal
        window.onload = () => {
            gsap.from(".hero-content h1", {
                y: 50, opacity: 0, duration: 1.2, ease: "power4.out"
            });
        };
    </script>
